name: Build and Release Plugin

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Validate, Build and Publish Release
    runs-on: ubuntu-latest

    env:
      RELEASE_ZIP: dist/grey-rock-block-synchroniser-for-wordfence-and-cloudflare.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${{ inputs.version }}"
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version: ${version}"
            exit 1
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Validate and build release package
        run: make release VERSION="${{ steps.version.outputs.value }}"

      - name: Generate SHA-256 checksum
        run: sha256sum "${RELEASE_ZIP}" > "${RELEASE_ZIP}.sha256"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          target_commitish: ${{ github.sha }}
          name: Grey Rock Block Synchroniser for Wordfence and Cloudflare ${{ steps.version.outputs.value }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/grey-rock-block-synchroniser-for-wordfence-and-cloudflare.zip
            dist/grey-rock-block-synchroniser-for-wordfence-and-cloudflare.zip.sha256
